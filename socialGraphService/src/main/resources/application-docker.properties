server.port=8083
spring.application.name=socialGraphService

spring.datasource.url=jdbc:postgresql://postgres:5432/social_graph_service_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

management.metrics.enable.all=false
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoint.info.enabled=true
management.metrics.use-global-registry=false
spring.jmx.enabled=false

management.metrics.binders.processor.enabled=false
management.health.diskspace.enabled=false
management.health.livenessstate.enabled=false
management.health.readinessstate.enabled=false
spring.main.banner-mode=off

spring.autoconfigure.exclude=\
org.springframework.boot.actuate.autoconfigure.metrics.MetricsAutoConfiguration,\
org.springframework.boot.actuate.autoconfigure.metrics.web.client.HttpClientMetricsAutoConfiguration,\
org.springframework.boot.actuate.autoconfigure.metrics.SystemMetricsAutoConfiguration